<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Details Form</title>
    <link rel="icon" href="favicon.ico">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image: url('https://media.getmyuni.com/azure/college-image/big/reva-university-revau-bangalore.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font-family: Arial, sans-serif;
        }
        .form-container {
            background-color: rgba(255, 255, 255, 0.5);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
            width: 90%;
            max-width: 600px;
            margin: 0 auto;
        }
        h2 {
            text-align: center;
            color: #333;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .submit-btn {
            width: 100%;
            background-color: #007bff;
            color: #fff;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
        }
        .submit-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Team Registration Form</h2>
        <form action="Team.php" method="POST">
            <!-- Team Member Names -->
            <label for="team_names">Team Members Names:</label>
            <input type="text" id="team_names" name="team_names" placeholder="Enter all team members' names separated by commas" required>

            <!-- SRNs -->
            <label for="srns">SRNs:</label>
            <input type="text" id="srns" name="srns" placeholder="Enter SRNs separated by commas" required>

            <!-- Date -->
            <label for="date">Date:</label>
            <input type="date" id="date" name="date" required>

            <!-- Event Type -->
            <label for="event_type">Select Event:</label>
            <select id="event_type" name="event_type" required>
                <option value="">-- Select Event type --</option>
                <option value="HACKATHON">HACKATHON</option>
                <option value="FACE">FACE</option>
                <option value="SPORTS">SPORTS</option>
                <option value="PLACEMENT">PLACEMENT</option>
                <option value="INTERNSHIP">INTERNSHIP</option>
                <option value="FDP">FDP</option>
                <option value="OTHERS">OTHERS</option>
            </select>

            <button type="submit" class="submit-btn">Submit</button>
        </form>
    </div>
</body>
</html>
