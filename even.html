<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selection Page</title>
    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="enent.css">
    <style>
        /* Style for the entire page */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image: url('https://media.getmyuni.com/azure/college-image/big/reva-university-revau-bangalore.jpg'); /* Replace with a URL of your preferred nature image */
            background-size: cover;
            background-position: center;
            font-family: Arial, sans-serif;
        }

        /* Container to hold the options */
        .container {
            text-align: center;
            background-color: rgba(255, 255, 255, 0.8);
            padding: 50px 50px;
            border-radius: 10px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
        }

        /* Styles for options */
        .option {
            margin: 20px 0;
            font-size: 24px;
        }

        /* Button styles */
        button {
            padding: 10px 30px;
            font-size: 18px;
            color: white;
            background-color: #39a04f; /* Green background */
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        /* Button hover effect */
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="option">
            <label>Individual</label>
            <a href="forms.html" class="button">Select</a>
        </div>
        <div class="option">
            <label>Team</label>
            <a href="Team.html" class="button">Select</a>
        </div>
    </div>
</body>
</html>
