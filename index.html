<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index Page</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-image: url('background.jpg'); /* Replace with your image */
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            text-align: center;
            background: rgba(255, 242, 225, 0.9);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }
        h1 {
            margin-bottom: 20px;
            color: #000000;
        }
        .button {
            padding: 10px 20px;
            margin: 10px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .orange-button {
            background-color: orange;
            color: rgb(255, 246, 246);
        }
        .red-button {
            background-color: orange;
            color: rgb(255, 241, 241);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Choose Your Role</h1>
        <a href="student-login.html"><button class="button orange-button">Student</button></a>
        <a href="professor-login.html"><button class="button red-button">Professor</button></a>
        <br>
        <a href=""><button class="button red-button">Status</button></a>
    </div>
</body>
</html>
